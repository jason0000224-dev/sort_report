<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁 - 演算法視覺化</title>
    <style>
        :root {
            --bg:      #0d1117;
            --card:    #161b22;
            --border:  #30363d;
            --text:    #e6edf3;
            --sub:     #8b949e;
            --blue:    #58a6ff;
            --purple:  #a371f7;
        }
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "Noto Sans TC", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 16px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: .04em;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle { 
            color: var(--sub); 
            font-size: .9rem; 
            margin-bottom: 32px;
            text-align: center;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px 28px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--blue);
        }
        nav ul {
            list-style: none;
        }
        nav li {
            margin-bottom: 12px;
        }
        nav a {
            display: block;
            padding: 14px 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: .95rem;
            transition: all .2s;
            position: relative;
            padding-left: 42px;
        }
        nav a::before {
            content: "→";
            position: absolute;
            left: 18px;
            color: var(--purple);
            font-weight: bold;
            transition: transform .2s;
        }
        nav a:hover {
            border-color: var(--blue);
            background: rgba(88, 166, 255, 0.1);
            transform: translateX(4px);
        }
        nav a:hover::before {
            transform: translateX(4px);
        }
        .footer {
            margin-top: 32px;
            color: var(--sub);
            font-size: .8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🎯 演算法視覺化</h1>
    <p class="subtitle">Algorithm Visualization — 互動式學習演算法</p>
    
    <div class="card">
        <h2>排序演算法</h2>
        <nav>
            <ul>
                <li><a href="bubble_sort.html">氣泡排序 (Bubble Sort)</a></li>
                <li><a href="selection_sort.html">選擇排序 (Selection Sort)</a></li>
                <li><a href="insertion_sort.html">插入排序 (Insertion Sort)</a></li>
                <li><a href="quick_sort.html">快速排序 (Quick Sort)</a></li>
                <li><a href="merge_sort.html">合併排序 (Merge Sort)</a></li>
            </ul>
        </nav>
    </div>

    <div class="footer">
        透過視覺化工具深入理解演算法運作原理
    </div>
</body>
</html>
